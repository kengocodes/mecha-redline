<html lang="en">

    <link rel="icon" href="./favicon.ico" sizes="any" />

    />
    <link
      rel="icon"
      type="image/png"
      href="./icons/icon-512.png"
      sizes="512x512"
    />
    <link rel="apple-touch-icon" href="./icons/apple-touch-icon.png" />

    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://mecha-redline.vercel.app/" />
    <meta property="og:site_name" content="MECHA REDLINE" />

      property="og:description"

    />

    />

    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="MECHA REDLINE logo" />

    <meta name="twitter:card" content="summary_large_image" />

      name="twitter:description"
      content="A bullet-hell anime mecha shooter for the browser. Dodge waves of enemy fire and take down the boss. Play on desktop with keyboard + mouse."

      name="twitter:image"

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DotGothic16&display=swap"
      rel="stylesheet"
    />
    <!-- Deep-link privacy/terms: skip loading chrome flash before modules run.
         Strip a trailing slash so relative BASE_URL assets still resolve
         (./assets from /privacy/ would otherwise look under /privacy/). -->
    <script>
      if (/^\/(privacy|terms)\/$/.test(location.pathname)) {
        history.replaceState(
          null,
          "",
          location.pathname.slice(0, -1) + location.search + location.hash,
        );
      }
      if (/^\/(privacy|terms)\/?$/.test(location.pathname)) {
        document.documentElement.classList.add("legal-reading");
      }
    </script>
  </head>
  <body>
    <div id="stage">
      <div id="loading">
        MECHA REDLINE<span class="sub">LOADING SYSTEM ── 起動中</span>
      </div>
    </div>

    <!-- Legal pages live outside #stage so game chrome never wraps them. -->
    <div id="legal" class="legal-screen hidden">
      <div class="legal-shell">
        <a href="./" id="btn-legal-back" class="legal-back">← Back to game</a>
        <div id="legal-content"></div>
      </div>
    </div>

    <script type="module" src="./src/main.ts"></script>
  </body>
</html>
